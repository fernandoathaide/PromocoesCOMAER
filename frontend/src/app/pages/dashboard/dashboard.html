<header class="dashboard-header">
  <h2>Dashboard</h2>

  <button mat-raised-button color="primary" (click)="executarSimulacao()">
    Executar Simulação
  </button>
</header>

@if (resultado; as dados) {
  <app-painel-indicadores [resultado]="dados"> </app-painel-indicadores>
  <app-lista-promocoes [promocoes]="dados.promocoes"> </app-lista-promocoes>
} @else {
  <p>Carregando indicadores...</p>
}
