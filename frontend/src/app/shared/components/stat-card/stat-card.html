<mat-card class="stat-card" [style.--card-color]="cor()">
  <div class="icon-container">
    <mat-icon class="icon">
      {{ icone() }}
    </mat-icon>
  </div>

  <div class="content">
    <span class="title">
      {{ titulo() }}
    </span>

    <span class="value">
      {{ valor() }}
    </span>
  </div>
</mat-card>
